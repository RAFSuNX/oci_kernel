name: CI / Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Unit tests (host target, no QEMU needed) ──────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run unit tests
        run: make test

  # ── Build BIOS + UEFI disk images ─────────────────────────────────────────
  build:
    name: Build Disk Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      stem: ${{ steps.stem.outputs.stem }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Tagged release → oci-kernel-1.2.3-{bios,uefi}.img
      # Master push   → oci-kernel-dev-a1b2c3d4-{bios,uefi}.img
      - name: Compute image stem
        id: stem
        env:
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          if [[ "$REF" == refs/tags/v* ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="dev-${SHA::8}"
          fi
          STEM="oci-kernel-${VERSION}"
          echo "stem=${STEM}" >> "$GITHUB_OUTPUT"
          echo "Building images with stem: ${STEM}"

      - name: Build kernel
        run: make build

      - name: Install qemu-utils (for qemu-img)
        run: sudo apt-get install -y --no-install-recommends qemu-utils

      - name: Build BIOS + UEFI disk images
        env:
          STEM: ${{ steps.stem.outputs.stem }}
        run: make image STEM="$STEM"

      - name: Convert raw images to QCOW2 (QEMU native format)
        env:
          STEM: ${{ steps.stem.outputs.stem }}
        run: |
          qemu-img convert -f raw -O qcow2 -c "${STEM}-bios.img" "${STEM}-bios.qcow2"
          qemu-img convert -f raw -O qcow2 -c "${STEM}-uefi.img" "${STEM}-uefi.qcow2"
          echo "Image sizes:"
          ls -lh "${STEM}"-*.img "${STEM}"-*.qcow2

      - name: Upload BIOS raw image
        uses: actions/upload-artifact@v4
        with:
          name: bios-raw
          path: ${{ steps.stem.outputs.stem }}-bios.img
          retention-days: 7

      - name: Upload UEFI raw image
        uses: actions/upload-artifact@v4
        with:
          name: uefi-raw
          path: ${{ steps.stem.outputs.stem }}-uefi.img
          retention-days: 7

      - name: Upload BIOS QCOW2 image
        uses: actions/upload-artifact@v4
        with:
          name: bios-qcow2
          path: ${{ steps.stem.outputs.stem }}-bios.qcow2
          retention-days: 7

      - name: Upload UEFI QCOW2 image
        uses: actions/upload-artifact@v4
        with:
          name: uefi-qcow2
          path: ${{ steps.stem.outputs.stem }}-uefi.qcow2
          retention-days: 7

  # ── GitHub Release (only on version tags) ─────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OCI Kernel ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            bios-raw/*.img
            uefi-raw/*.img
            bios-qcow2/*.qcow2
            uefi-qcow2/*.qcow2
          body: |
            ## Boot Images

            | File | Format | Use case |
            |------|--------|----------|
            | `*-bios.img` | Raw disk | BIOS boot, `dd` to USB, QEMU with `format=raw` |
            | `*-uefi.img` | Raw disk | UEFI boot, `dd` to USB, QEMU with `format=raw` |
            | `*-bios.qcow2` | QCOW2 | QEMU native (smaller, copy-on-write snapshots) |
            | `*-uefi.qcow2` | QCOW2 | QEMU native UEFI (smaller, copy-on-write snapshots) |

            ## Quick Start

            ### QEMU — BIOS (raw)
            ```bash
            qemu-system-x86_64 \
              -drive format=raw,file=oci-kernel-*-bios.img \
              -serial stdio -m 512M -no-reboot \
              -netdev user,id=net0,hostfwd=tcp::8080-:80 \
              -device virtio-net-pci,netdev=net0
            ```

            ### QEMU — BIOS (QCOW2, recommended)
            ```bash
            qemu-system-x86_64 \
              -drive format=qcow2,file=oci-kernel-*-bios.qcow2 \
              -serial stdio -m 512M -no-reboot \
              -netdev user,id=net0,hostfwd=tcp::8080-:80 \
              -device virtio-net-pci,netdev=net0
            ```

            ### QEMU — UEFI (QCOW2, requires OVMF)
            ```bash
            qemu-system-x86_64 \
              -bios /usr/share/ovmf/x64/OVMF.4m.fd \
              -drive format=qcow2,file=oci-kernel-*-uefi.qcow2 \
              -serial stdio -m 512M -no-reboot \
              -netdev user,id=net0,hostfwd=tcp::8080-:80 \
              -device virtio-net-pci,netdev=net0
            ```

            ### Real Hardware (USB / bare metal)
            ```bash
            # BIOS systems
            sudo dd if=oci-kernel-*-bios.img of=/dev/sdX bs=4M status=progress
            # UEFI systems
            sudo dd if=oci-kernel-*-uefi.img of=/dev/sdX bs=4M status=progress
            ```

            Then `curl http://localhost:8080` (QEMU) or `http://<machine-ip>:8080` (real HW).
            Serial console (COM1, 115200 8N1) — login: `root` / `root`
