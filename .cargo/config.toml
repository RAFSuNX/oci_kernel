[unstable]
# json-target-spec is needed for the custom kernel target JSON file.
# build-std is NOT set here (would cause duplicate lang items in `cargo test`).
# --target and -Zbuild-std are passed explicitly in the Makefile instead.
# The [build] default target is also NOT set here: if it were, the runner
# (a host binary) would inherit it and fail to find `core`.
json-target-spec = true
